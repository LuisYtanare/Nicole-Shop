<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicole-Shop</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fuente Montserrat corregida -->
     <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR SUPERIOR Y MENÚS FIJOS -->
    <header class="header-main">
        <div class="top-nav">
            <div class="logo"><a href="#" class="nav-link" data-link="inicio">NICOLE-SHOP</a></div>
            <div class="top-icons">
                <span><i class="fa-solid fa-magnifying-glass"></i></span>
                <span class="nav-link" data-link="carrito"><i class="fa-solid fa-cart-shopping"></i></span>
            </div>
        </div>

        <!-- BLOQUE ROSA: CARRUSEL INFINITO (85px) -->
        <div class="mini-carousel-bg">
            <div class="carousel-track" id="carouselTrack">
                <div class="slide-item"><span>✨ ENVÍO GRATIS HOY</span></div>
                <div class="slide-item"><span>💄 3X2 EN LABIALES</span></div>
                <div class="slide-item"><span>🧴 NUEVA LÍNEA CREMES</span></div>
            </div>
        </div>

        <!-- BARRA DE CATEGORÍAS (40px) -->
        <nav class="category-bar">
            <!-- Izquierda: Botón Plus -->
            <div class="extra-menu-container">
                <button id="extraBtn" class="plus-icon">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <div id="extraDropdown" class="dropdown-content">
                    <span class="nav-link" data-link="opcion1">Opcion 1</span>
                    <span class="nav-link" data-link="opcion2">Opcion 2</span>
                    <span class="nav-link" data-link="opcion3">Opcion 3</span>
                </div>
            </div>

            <!-- Derecha: Categorías principales -->
            <div class="main-categories">
                <span class="nav-link" data-link="cremas">CREMES</span>
                <span class="sep">|</span>
                <span class="nav-link" data-link="perfumes">PERFUMES</span>
                <span class="sep">|</span>
                <span class="nav-link" data-link="maquillaje">MAQUIAGEM</span>
            </div>
        </nav>
    </header>

    <!-- CONTENEDOR DE PÁGINAS DINÁMICAS -->
    <main id="app"></main>

    <!-- FOOTER TAB BAR -->
    <footer class="footer-tab">
        <div class="nav-link" data-link="inicio"><i class="fa-solid fa-house"></i></div>
        <div class="nav-link" data-link="favoritos"><i class="fa-solid fa-heart"></i></div>
        <div class="nav-link" data-link="whatsapp"><i class="fa-brands fa-whatsapp"></i></div>
        <div class="nav-link" data-link="perfil"><i class="fa-solid fa-user"></i></div>
    </footer>

    <!-- SCRIPTS: Importante el type="module" para Firebase -->
    <script src="https://kit.fontawesome.com/f362ae2630.js" crossorigin="anonymous"></script>
    <script type="module" src="./script.js"></script>
</body>
</html>
