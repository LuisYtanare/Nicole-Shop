<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Nicole-Shop</title>
    <link rel="stylesheet" href="admin-style.css" />
  </head>
  <body>
    <div class="admin-container">
      <section id="login-section" class="form-section">
        <h1>Acceso Administrador</h1>
        <form id="loginForm">
          <input
            type="email"
            id="login-email"
            placeholder="Correo electrónico"
            required
          />
          <input
            type="password"
            id="login-pass"
            placeholder="Contraseña"
            required
          />
          <button type="submit">ENTRAR AL PANEL</button>
        </form>
      </section>

      <section id="admin-content" style="display: none">
        <header>
          <h1>Registrador de Productos</h1>
          <div style="display: flex; gap: 10px">
            <button
              id="btn-logout"
              class="btn-back"
              style="background-color: #ff4d4d"
            >
              Cerrar Sesión
            </button>
            <a href="index.html" class="btn-back">Ver Tienda</a>
          </div>
        </header>

        <section class="form-section">
          <form id="productForm">
            <input
              type="text"
              id="p-nombre"
              placeholder="Nombre del producto"
              required
            />

            <select id="p-seccion">
              <option value="maquillaje">Maquillaje</option>
              <option value="perfumes">Perfumes</option>
              <option value="cremas">Cremas</option>
            </select>

            <input
              type="number"
              id="p-precio"
              placeholder="Precio (R$)"
              step="0.01"
              required
            />
            <input
              type="text"
              id="p-imagen"
              placeholder="URL de la imagen (JPG/PNG)"
              required
            />

            <button type="submit" id="btn-save">REGISTRAR PRODUCTO</button>
          </form>
        </section>

        <section class="list-section">
          <h2>Productos Registrados</h2>
          <div id="admin-list" class="admin-grid"></div>
        </section>
      </section>
    </div>

    <script type="module" src="./admin-script.js"></script>
  </body>
</html>
